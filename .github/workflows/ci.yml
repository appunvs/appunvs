name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relay:
    name: relay (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -timeout 120s
        env:
          APPUNVS_TEST_REDIS: localhost:6379

  # The `app/` Expo monorepo is at skeleton stage in this PR (no lockfile,
  # SDK versions pinned but not yet installed). A `tsc --noEmit` job will
  # land once the workspace stabilizes — see TODO in app/README.md.

  desktop:
    name: desktop (Tauri/Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      # Lib tests + drift test. The e2e test requires a running relay and
      # is skipped here.
      - run: cargo test --lib
      - run: cargo test --test drift
