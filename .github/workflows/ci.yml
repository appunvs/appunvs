name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relay:
    name: relay (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -timeout 90s
        env:
          APPUNVS_TEST_REDIS: localhost:6379

  browser:
    name: browser (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: browser/package-lock.json
      - run: npm ci
      # Unit + drift tests. Excludes src/**/e2e.test.ts (needs live relay).
      - run: npm test

  desktop:
    name: desktop (Tauri/Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      # Lib tests (wire unit) + drift test. The e2e test requires a running
      # relay and is skipped here.
      - run: cargo test --lib
      - run: cargo test --test drift

  mobile:
    name: mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      # Unit wire tests + drift test. wire_e2e_test.dart needs a live relay;
      # skip by naming the files explicitly.
      - run: flutter test test/wire_test.dart test/drift_test.dart
