name: CI

on:
  pull_request:
  push:
    branches: [main]

# When sandbox_docker fails on a PR, post the captured log as a PR
# comment so failures are visible without repo admin access to the
# actions log download endpoint.  Mirrors the pattern used by
# native.yml.
permissions:
  contents: read
  pull-requests: write

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relay:
    name: relay (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -timeout 120s
        env:
          APPUNVS_TEST_REDIS: localhost:6379

  # Sandbox docker round-trip — builds the appunvs/sandbox image (the
  # one DockerBuilder shells out to) and runs the gated integration
  # tests (build tag `docker_integration`) against the live image.
  # This is the "real Metro builder" smoke for the publish path.
  #
  # Triggered on changes to relay/, runtime/sandbox/, runtime/src/,
  # runtime/package*.json — not on every PR (the image build burns ~5
  # min on cold cache).
  sandbox_docker:
    name: sandbox docker (DockerBuilder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build sandbox image
        # Build-context is runtime/ (see runtime/sandbox/Dockerfile
        # comment).  --load makes the image visible to the local
        # docker daemon so the Go test can `docker run` it.
        uses: docker/build-push-action@v5
        with:
          context: runtime
          file: runtime/sandbox/Dockerfile
          tags: appunvs/sandbox:ci
          load: true
          # gha cache: maps the layer cache into GitHub's storage so
          # subsequent runs hit the npm-install layer.  Saves ~5 min
          # cold-cache → ~30s warm-cache.
          cache-from: type=gha,scope=appunvs-sandbox
          cache-to: type=gha,scope=appunvs-sandbox,mode=max

      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum

      - name: Run docker integration tests
        working-directory: relay
        env:
          APPUNVS_SANDBOX_IMAGE: appunvs/sandbox:ci
        run: go test -tags docker_integration ./internal/sandbox/... -timeout 5m -v 2>&1 | tee /tmp/sandbox-docker.log

      - name: Capture image build log on failure
        if: failure()
        run: |
          echo "=== docker images ==="
          docker images || true
          echo ""
          echo "=== container last logs (if any) ==="
          docker ps -a || true

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            if [ -f /tmp/sandbox-docker.log ]; then
              echo "**sandbox-docker.log** (last 200 lines)"
              echo ""
              echo '```'
              tail -200 /tmp/sandbox-docker.log
              echo '```'
            else
              echo "(no /tmp/sandbox-docker.log — failure happened before the test step ran)"
            fi
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md

  # Native iOS + Android jobs live in `.github/workflows/native.yml` so
  # they only fire on `runtime/**` changes.  The Tauri job that lived
  # here is gone with the desktop pivot; v1 ships mobile-only.
