name: Native

on:
  pull_request:
    paths:
      - 'appunvs/**'
      - 'runtime/**'
      - '.github/workflows/native.yml'
  push:
    branches: [main]
    paths:
      - 'appunvs/**'
      - 'runtime/**'
      - '.github/workflows/native.yml'

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: appunvs/ios (Xcode)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: appunvs/ios
        run: xcodegen generate

      - name: Build (Debug, simulator)
        working-directory: appunvs/ios
        run: |
          set -o pipefail
          xcodebuild \
            -project Runtime.xcodeproj \
            -scheme Runtime \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

  android:
    name: appunvs/android (Gradle)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-24.04 ships with Android SDK pre-installed at
      # $ANDROID_HOME (= $ANDROID_SDK_ROOT).  Verify the components AGP
      # 8.7 + compileSdk 35 needs are present; install if not.
      - name: Ensure Android SDK 35
        run: |
          set -e
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME" || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: appunvs/android
        run: |
          gradle --version
          gradle assembleDebug --stacktrace --info --no-daemon
