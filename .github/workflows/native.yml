name: Native

on:
  pull_request:
    paths:
      - 'appunvs/**'
      - 'runtime/**'
      - '.github/workflows/native.yml'
  push:
    branches: [main]
    paths:
      - 'appunvs/**'
      - 'runtime/**'
      - '.github/workflows/native.yml'

# When a CI job fails on a PR, post the captured build log as a PR
# comment so failures are visible without needing repo admin access to
# the actions log download endpoint.  Requires write access to PRs.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

# Cache strategy (lockfile-keyed after #24 landed both lockfiles):
#   - runtime/node_modules: keyed on runtime/package-lock.json hash.
#     npm install becomes a near no-op on cache hit.
#   - ~/Library/Caches/CocoaPods: keyed on runtime/ios/Podfile.lock hash.
#     Saves the slow CDN spec-fetch.  macOS jobs only.
#   - runtime/ios/Pods: also keyed on Podfile.lock — pod install is a
#     no-op when the cached Pods/Manifest.lock matches Podfile.lock,
#     so the entire install step is skipped.  Saves ~3-5 min per iOS job.
#   - Gradle: handled by gradle/actions/setup-gradle@v4 itself.
# Skipped:
#   - ~/Library/Developer/Xcode/DerivedData (project hash + Xcode
#     version key combos are messy; cache often invalidates anyway).
#     Where the BIG ~10-15 min iOS-compile saving lives — can revisit
#     if the Pods/ cache + lockfile hash combo proves stable.

jobs:
  ios:
    name: appunvs/ios (Xcode)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache runtime/node_modules
        uses: actions/cache@v4
        with:
          path: runtime/node_modules
          key: ${{ runner.os }}-runtime-node-modules-${{ hashFiles('runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-runtime-node-modules-

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('runtime/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Cache runtime/ios/Pods
        # Pods/ contents are a deterministic function of Podfile.lock —
        # on a cache hit pod install will see Pods/Manifest.lock matches
        # the live Podfile.lock and skip the install entirely.  ~3-5 min
        # saved per iOS job.  Can't safely use restore-keys here because
        # a partial-match Pods/ from a different lockfile could leave
        # CocoaPods's incremental check in a confused state.
        uses: actions/cache@v4
        with:
          path: runtime/ios/Pods
          key: ${{ runner.os }}-runtime-ios-pods-${{ hashFiles('runtime/ios/Podfile.lock') }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build RuntimeSDK.xcframework
        id: sdk_build
        run: bash runtime/packaging/build-ios.sh 2>&1 | tee /tmp/sdk-build.log

      - name: Generate Xcode project
        working-directory: appunvs/ios
        run: xcodegen generate 2>&1 | tee /tmp/xcodegen.log

      - name: Build (Debug, simulator)
        working-directory: appunvs/ios
        run: |
          set -o pipefail
          xcodebuild \
            -project Runtime.xcodeproj \
            -scheme Runtime \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee /tmp/xcodebuild.log

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            for log in /tmp/sdk-build.log /tmp/xcodegen.log /tmp/xcodebuild.log; do
              if [ -f "$log" ]; then
                echo ""
                echo "**$(basename $log)** (last 120 lines)"
                echo ""
                echo '```'
                tail -500 "$log"
                echo '```'
              fi
            done
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md

  android:
    name: appunvs/android (Gradle)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache runtime/node_modules
        uses: actions/cache@v4
        with:
          path: runtime/node_modules
          key: ${{ runner.os }}-runtime-node-modules-${{ hashFiles('runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-runtime-node-modules-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure Android SDK 35
        run: |
          set -e
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME" || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build runtime.aar
        run: bash runtime/packaging/build-android.sh 2>&1 | tee /tmp/sdk-build.log

      - name: Build debug APK
        working-directory: appunvs/android
        run: |
          gradle --version
          gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee /tmp/gradle-host.log

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            for log in /tmp/sdk-build.log /tmp/gradle-host.log; do
              if [ -f "$log" ]; then
                echo ""
                echo "**$(basename $log)** (last 120 lines)"
                echo ""
                echo '```'
                tail -500 "$log"
                echo '```'
              fi
            done
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md

  runtime_sdk_ios:
    name: runtime SDK iOS (Framework)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache runtime/node_modules
        uses: actions/cache@v4
        with:
          path: runtime/node_modules
          key: ${{ runner.os }}-runtime-node-modules-${{ hashFiles('runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-runtime-node-modules-

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('runtime/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Cache runtime/ios/Pods
        # Pods/ contents are a deterministic function of Podfile.lock —
        # on a cache hit pod install will see Pods/Manifest.lock matches
        # the live Podfile.lock and skip the install entirely.  ~3-5 min
        # saved per iOS job.  Can't safely use restore-keys here because
        # a partial-match Pods/ from a different lockfile could leave
        # CocoaPods's incremental check in a confused state.
        uses: actions/cache@v4
        with:
          path: runtime/ios/Pods
          key: ${{ runner.os }}-runtime-ios-pods-${{ hashFiles('runtime/ios/Podfile.lock') }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build RuntimeSDK.xcframework
        run: bash runtime/packaging/build-ios.sh 2>&1 | tee /tmp/sdk-build.log

      - name: Verify artifact
        run: |
          test -d runtime/build/ios/RuntimeSDK.xcframework
          ls -la runtime/build/ios/RuntimeSDK.xcframework

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            if [ -f /tmp/sdk-build.log ]; then
              echo "**sdk-build.log** (last 120 lines)"
              echo ""
              echo '```'
              tail -500 /tmp/sdk-build.log
              echo '```'
            fi
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md

  runtime_sdk_android:
    name: runtime SDK Android (Library)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache runtime/node_modules
        uses: actions/cache@v4
        with:
          path: runtime/node_modules
          key: ${{ runner.os }}-runtime-node-modules-${{ hashFiles('runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-runtime-node-modules-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure Android SDK 35
        run: |
          set -e
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build runtime.aar
        run: bash runtime/packaging/build-android.sh 2>&1 | tee /tmp/sdk-build.log

      - name: Verify artifact
        run: |
          test -f runtime/build/android/runtime.aar
          ls -la runtime/build/android/runtime.aar

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            if [ -f /tmp/sdk-build.log ]; then
              echo "**sdk-build.log** (last 120 lines)"
              echo ""
              echo '```'
              tail -500 /tmp/sdk-build.log
              echo '```'
            fi
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md

  # D3.c.4: instrumented UI test that asserts RuntimeView actually
  # loads + evaluates the fixture bundle and renders the registered
  # "RuntimeRoot" component.  Boots an Android emulator (KVM-accelerated
  # via /dev/kvm) and runs the test from runtime/android/runtimesdk's
  # androidTest source set.  iOS counterpart pending (tracked in #18).
  runtime_sdk_android_instrumented:
    name: runtime SDK Android (instrumented)
    runs-on: ubuntu-latest
    # The emulator-runner action burns ~3-4 min of cold-boot time even
    # with KVM + AVD cache.  Generous timeout protects against
    # transient emulator hangs without sitting on a stalled job for
    # the default 6h.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache runtime/node_modules
        uses: actions/cache@v4
        with:
          path: runtime/node_modules
          key: ${{ runner.os }}-runtime-node-modules-${{ hashFiles('runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-runtime-node-modules-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure Android SDK 35
        run: |
          set -e
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM permissions on ubuntu-latest (24.04+): the runner image
      # ships /dev/kvm but locks it to the kvm group; the runner user
      # isn't in that group.  Without this, the emulator falls back to
      # software rendering and times out.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Build the JS fixture and stage it as an androidTest asset so
      # the test APK includes RuntimeRoot.jsbundle in its assets/ dir.
      # build-fixture.sh runs the existing fixture pipeline that the
      # `runtime fixture bundle` job already exercises.
      - name: Build + stage fixture bundle
        run: |
          bash runtime/packaging/build-fixture.sh 2>&1 | tee /tmp/fixture-build.log
          mkdir -p runtime/android/runtimesdk/src/androidTest/assets
          cp runtime/build/fixture/android/RuntimeRoot.jsbundle \
             runtime/android/runtimesdk/src/androidTest/assets/RuntimeRoot.jsbundle

      - name: Run instrumented test (emulator)
        # reactivecircus/android-emulator-runner provisions an AVD,
        # boots the emulator with KVM, runs the script, and tears down.
        # arch=x86_64 is the only thing fast enough to be tractable in
        # CI; api-level 34 (one below host's 35) is the latest with a
        # stable system image at this writing.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd runtime/android
            gradle :runtimesdk:connectedDebugAndroidTest --stacktrace --info 2>&1 | tee /tmp/instrumented.log

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            for log in /tmp/fixture-build.log /tmp/instrumented.log; do
              if [ -f "$log" ]; then
                echo ""
                echo "**$(basename $log)** (last 300 lines)"
                echo ""
                echo '```'
                tail -300 "$log"
                echo '```'
              fi
            done
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md

  fixture_bundle:
    name: runtime fixture bundle
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache runtime/node_modules
        uses: actions/cache@v4
        with:
          path: runtime/node_modules
          key: ${{ runner.os }}-runtime-node-modules-${{ hashFiles('runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-runtime-node-modules-

      - name: Build fixture bundle
        run: bash runtime/packaging/build-fixture.sh 2>&1 | tee /tmp/fixture-build.log

      - name: Verify artifacts
        run: |
          test -f runtime/build/fixture/ios/RuntimeRoot.jsbundle
          test -f runtime/build/fixture/android/RuntimeRoot.jsbundle
          # The fixture must register "RuntimeRoot", otherwise RuntimeView
          # mounts an empty surface and D3.c.4 UI tests silently pass.
          # Grep for the registration string before declaring success.
          grep -q 'RuntimeRoot' runtime/build/fixture/ios/RuntimeRoot.jsbundle
          grep -q 'RuntimeRoot' runtime/build/fixture/android/RuntimeRoot.jsbundle

      - name: Sandbox bundle smoke (@appunvs/host resolver)
        # Bundles runtime/sandbox/fixture-host-import/index.tsx through
        # sandbox/metro.config.js — exercises the resolveRequest shim
        # that maps the bare specifier '@appunvs/host' onto
        # runtime/src/HostBridge.ts.  The fixture imports + uses
        # host().sdkVersion at render time so the bridge code can't be
        # tree-shaken away.  Produces build/sandbox/HostImport.jsbundle.
        working-directory: runtime
        run: |
          set -o pipefail
          mkdir -p build/sandbox
          # --entry-file is relative to the metro project root, which the
          # sandbox config sets to runtime/sandbox/ via getDefaultConfig(__dirname).
          # So "fixture-host-import/index.tsx" — NOT "sandbox/fixture-host-import/...".
          npx --no-install react-native bundle \
            --config sandbox/metro.config.js \
            --entry-file fixture-host-import/index.tsx \
            --platform ios \
            --dev false \
            --minify false \
            --bundle-output build/sandbox/HostImport.jsbundle 2>&1 \
            | tee /tmp/sandbox-bundle.log
          # The MMKV namespace prefix is unique to runtime/src/HostBridge.ts's
          # makeMmkvStorage() — proves the resolver mapped @appunvs/host
          # to the right file AND that the D3.e.3 storage code path made it
          # into the bundle (no tree-shake).
          grep -q 'appunvs-box-' build/sandbox/HostImport.jsbundle
          # And the registered fixture component name.
          grep -q 'host-import-root' build/sandbox/HostImport.jsbundle

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI failure: \`${{ github.job }}\` on \`${{ github.head_ref }}\` @ \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            for log in /tmp/fixture-build.log /tmp/sandbox-bundle.log; do
              if [ -f "$log" ]; then
                echo ""
                echo "**$(basename $log)** (last 120 lines)"
                echo ""
                echo '```'
                tail -500 "$log"
                echo '```'
              fi
            done
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} -F /tmp/comment.md
