name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache-dependency-path: relay/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          working-directory: relay
          args: --timeout 5m

  # The clippy job that lived here is gone with the desktop pivot.
  # iOS and Android linting (SwiftLint / detekt) will land alongside
  # the UI port — for now native CI just enforces "it compiles".
