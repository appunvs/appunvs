syntax = "proto3";

// Account + device identity.  Three JWT flavors live here in spirit
// (session / device / namespace) — the namespace token shape is
// described in docs/auth.md and not modeled as a proto message because
// it's only ever serialized as an opaque JWT string.
package appunvs;

import "common.proto";

option go_package = "github.com/appunvs/appunvs/relay/internal/pb;pb";

// POST /auth/signup
message SignupRequest {
  string email    = 1;
  string password = 2;
}

// POST /auth/login
message LoginRequest {
  string email    = 1;
  string password = 2;
}

// Shared response for /auth/signup and /auth/login.
message SessionResponse {
  string user_id       = 1;
  string session_token = 2;  // JWT RS256, typ=session
}

// POST /auth/register (session-authenticated)
message RegisterRequest {
  string   device_id = 1;
  Platform platform  = 2;
}

message RegisterResponse {
  string token   = 1;  // JWT RS256, typ=device
  string user_id = 2;  // doubles as default namespace
}

// GET /auth/me
message MeResponse {
  string          user_id    = 1;
  string          email      = 2;
  int64           created_at = 3;     // ms unix
  repeated Device devices    = 4;
}

message Device {
  string   id         = 1;
  string   user_id    = 2;
  Platform platform   = 3;
  int64    created_at = 4;      // ms unix
  int64    last_seen  = 5;      // ms unix; 0 when never seen
}
