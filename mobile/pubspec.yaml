name: appunvs_mobile
description: appunvs mobile provider app - owns local SQLite data and syncs via the Go relay.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.22
  web_socket_channel: ^3.0.0
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
