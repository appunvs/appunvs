name: RuntimeSDK
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  RuntimeSDK:
    # Dynamic framework now that we link against React Native's dyld
    # libs (hermes-engine, React-Core, ReactCommon).  Static framework
    # would force-bundle those libs into our SDK; dynamic links them
    # at runtime from the host's pod-installed copies.
    type: framework
    platform: iOS
    sources:
      - path: SDK
        excludes:
          - "**/.DS_Store"
    # Pods xcconfig wired up by `pod install` AFTER xcodegen has created
    # this xcodeproj.  The .debug / .release xcconfigs set
    # FRAMEWORK_SEARCH_PATHS, HEADER_SEARCH_PATHS, OTHER_LDFLAGS so the
    # SDK target sees RN headers + links against hermes-engine.framework,
    # React-Core, ReactCommon, etc.  Files don't need to exist at
    # xcodegen time — just at xcodebuild time.
    configFiles:
      Debug: Pods/Target Support Files/Pods-RuntimeSDK/Pods-RuntimeSDK.debug.xcconfig
      Release: Pods/Target Support Files/Pods-RuntimeSDK/Pods-RuntimeSDK.release.xcconfig
    settings:
      base:
        PRODUCT_NAME: RuntimeSDK
        PRODUCT_BUNDLE_IDENTIFIER: com.appunvs.runtimesdk
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        SKIP_INSTALL: NO
        # Allow non-modular includes — RN's headers (React-Core,
        # ReactCommon, etc.) are still pre-modules in 0.85.
        CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES: YES
