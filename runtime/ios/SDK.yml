# `name` becomes the .xcodeproj filename.  We avoid `RuntimeSDK`
# (caps) because macOS's APFS is case-INSENSITIVE by default —
# `RuntimeSDK.xcodeproj` and `RuntimeSdk.xcodeproj` (the RN init's
# dev-harness app) hash to the same path and clobber each other.
# The TARGET stays `RuntimeSDK` with PRODUCT_NAME=RuntimeSDK below,
# so the framework binary still ships as RuntimeSDK.framework — only
# the xcodeproj filename differs.
name: AppunvsRuntimeSDK
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  RuntimeSDK:
    # Dynamic framework now that we link against React Native's dyld
    # libs (hermes-engine, React-Core, ReactCommon).  Static framework
    # would force-bundle those libs into our SDK; dynamic links them
    # at runtime from the host's pod-installed copies.
    type: framework
    platform: iOS
    sources:
      - path: SDK
        excludes:
          - "**/.DS_Store"
    # No `configFiles:` — XcodeGen validates those paths exist at
    # generate time, but Pods xcconfigs don't exist until `pod install`
    # runs (which happens AFTER xcodegen, since pod install needs the
    # xcodeproj to integrate the target).  pod install will modify
    # the generated xcodeproj's BASE_CONFIGURATION_REFERENCE for each
    # build configuration to point at the right xcconfig — that's its
    # default behaviour for any target it integrates.
    settings:
      base:
        PRODUCT_NAME: RuntimeSDK
        PRODUCT_BUNDLE_IDENTIFIER: com.appunvs.runtimesdk
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        SKIP_INSTALL: NO
        # Allow non-modular includes — RN's headers (React-Core,
        # ReactCommon, etc.) are still pre-modules in 0.85.
        CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES: YES
