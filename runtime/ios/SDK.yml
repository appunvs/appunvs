# `name` becomes the .xcodeproj filename.  We avoid `RuntimeSDK`
# (caps) because macOS's APFS is case-INSENSITIVE by default —
# `RuntimeSDK.xcodeproj` and `RuntimeSdk.xcodeproj` (the RN init's
# dev-harness app) hash to the same path and clobber each other.
# The TARGET stays `RuntimeSDK` with PRODUCT_NAME=RuntimeSDK below,
# so the framework binary still ships as RuntimeSDK.framework — only
# the xcodeproj filename differs.
name: AppunvsRuntimeSDK
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  RuntimeSDK:
    # Dynamic framework now that we link against React Native's dyld
    # libs (hermes-engine, React-Core, ReactCommon).  Static framework
    # would force-bundle those libs into our SDK; dynamic links them
    # at runtime from the host's pod-installed copies.
    type: framework
    platform: iOS
    sources:
      - path: SDK
        excludes:
          - "**/.DS_Store"
    # No `configFiles:` — XcodeGen validates those paths exist at
    # generate time, but Pods xcconfigs don't exist until `pod install`
    # runs (which happens AFTER xcodegen, since pod install needs the
    # xcodeproj to integrate the target).  pod install will modify
    # the generated xcodeproj's BASE_CONFIGURATION_REFERENCE for each
    # build configuration to point at the right xcconfig — that's its
    # default behaviour for any target it integrates.
    settings:
      base:
        PRODUCT_NAME: RuntimeSDK
        PRODUCT_BUNDLE_IDENTIFIER: com.appunvs.runtimesdk
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        SKIP_INSTALL: NO
  # D3.c.4 iOS instrumented UI test — fixture app that mounts a real
  # RuntimeView and loads the bundled RuntimeRoot.jsbundle.  Driven by
  # the RuntimeFixtureUITests target via XCUIApplication.
  RuntimeFixtureApp:
    type: application
    platform: iOS
    sources:
      - path: RuntimeFixtureApp
        excludes:
          - "**/.DS_Store"
    # Embed the fixture bundle as an app resource.  Path is relative
    # to runtime/ios (the SDK.yml location).  build-fixture.sh produces
    # this file before the app is built.
    resources:
      - path: ../build/fixture/ios/RuntimeRoot.jsbundle
        optional: true
    info:
      path: RuntimeFixtureApp/Info.plist
      properties:
        CFBundleDisplayName: RuntimeFixture
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_NAME: RuntimeFixtureApp
        PRODUCT_BUNDLE_IDENTIFIER: com.appunvs.runtimefixtureapp
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        # No code signing — runs only on simulator in CI / dev.
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        # Embed the SDK framework (Pods + RN dyld libs are integrated
        # by cocoapods after xcodegen runs).
        ENABLE_BITCODE: NO
    dependencies:
      - target: RuntimeSDK
        embed: true
        codeSign: false

  RuntimeFixtureUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RuntimeFixtureUITests
        excludes:
          - "**/.DS_Store"
    info:
      path: RuntimeFixtureUITests/Info.plist
      properties:
        CFBundleDisplayName: RuntimeFixtureUITests
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_NAME: RuntimeFixtureUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.appunvs.runtimefixtureapp.uitests
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TEST_TARGET_NAME: RuntimeFixtureApp
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - target: RuntimeFixtureApp
