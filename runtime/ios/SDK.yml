name: RuntimeSDK
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  RuntimeSDK:
    # Static framework: simpler than dynamic for an empty C-only SDK.
    # D3.b will flip to `framework` (dynamic) once we link RN's dyld
    # libs (hermes-engine.framework etc.).
    type: framework.static
    platform: iOS
    sources:
      - path: SDK
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: RuntimeSDK
        PRODUCT_BUNDLE_IDENTIFIER: com.appunvs.runtimesdk
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        SKIP_INSTALL: NO
