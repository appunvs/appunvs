# Minimal TLS terminator for the relay.  WebSocket-aware.
# Drop cert.pem + key.pem under ./deploy/tls/ before `docker compose --profile prod up`.
worker_processes auto;
events {
    worker_connections 4096;
}
http {
    # Keep buffers small — relay broadcasts are latency sensitive.
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 75s;

    upstream relay_backend {
        server relay:8080;
        keepalive 64;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP → HTTPS redirect.
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/tls/cert.pem;
        ssl_certificate_key /etc/nginx/tls/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Health probe surfaced unprotected so LBs can check without auth.
        location = /health {
            proxy_pass http://relay_backend/health;
        }

        # WebSocket: must forward Upgrade + Connection and disable buffering.
        location /ws {
            proxy_pass http://relay_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;   # long-lived connections
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://relay_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
