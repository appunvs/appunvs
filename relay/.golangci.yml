version: "2"

linters:
  default: standard
  settings:
    errcheck:
      # Writing to stdout/stderr almost never fails. fmt.Fprintf, fmt.Println,
      # fmt.Print etc. on os.Stdout/os.Stderr aren't worth guarding at every
      # call site in scripts and CLIs.
      exclude-functions:
        - fmt.Fprintf(os.Stdout)
        - fmt.Fprintf(os.Stderr)
        - fmt.Fprintln(os.Stdout)
        - fmt.Fprintln(os.Stderr)

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
